# ??? DataSource ????????????????????????????????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/smartloan_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ??? JPA / Hibernate ???????????????????????????????????????????????????????????
